<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provisioning Groundwire</title>
    <script>
        // Inserisci il link al tuo file config.xml su GitHub
        const xmlUrl = "https://polv89.github.io/gw-test/config.xml";
        
        // Usiamo provlinkbs:// che mappa nativamente l'HTTPS su Groundwire
        const provlink = xmlUrl.replace("https://", "provlinkbs://");

        window.onload = function() {
            const ua = navigator.userAgent;
            if (ua.indexOf('Groundwire') === -1 && ua.indexOf('Acrobits') === -1) {
                window.location.href = provlink;
            }
        };
    </script>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background: #f4f4f9; }
        .btn { display: inline-block; padding: 12px 24px; background: #0056b3; color: white; text-decoration: none; border-radius: 8px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Configurazione Groundwire in corso...</h2>
    <p>Se l'app non si apre automaticamente, clicca sul pulsante qui sotto.</p>
    
    <script>
        document.write('<a href="' + provlink + '" class="btn">Apri in Groundwire</a>');
    </script>
</body>
</html>
